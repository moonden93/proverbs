<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="잠언암기">
<meta name="theme-color" content="#050c1a">
<title>잠언 암기 (개역개정)</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050c1a; --bg2:#0d1b3e; --bg3:#1a2744;
  --accent:#2d5be3; --accent2:#60a5fa;
  --gold:#f0c040; --green:#86efac; --red:#fca5a5;
  --text:#e8edf8; --muted:#8ca0c8; --border:#1e3a6e;
  --font:Georgia,'Batang','Malgun Gothic',serif;
}
html{height:100%}
body{
  min-height:100%; background:var(--bg);
  color:var(--text); font-family:var(--font);
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:40px; overflow-x:hidden;
}

/* ── HEADER ── */
#header{
  position:sticky; top:0; z-index:100;
  width:100%; max-width:520px;
  background:rgba(5,12,26,.96); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.chip{
  background:var(--bg3); border:1px solid var(--border);
  border-radius:20px; color:#93b4ff;
  padding:6px 14px; font-size:13px; cursor:pointer;
  font-family:var(--font); white-space:nowrap;
}
#xpBadge{color:var(--gold)}
#heartsRow{font-size:18px; display:flex; gap:1px}

/* ── CHAPTER PANEL ── */
#chPanel{
  display:none; width:100%; max-width:520px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
#chGrid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px}
.chBtn{
  border-radius:8px; padding:8px 2px; cursor:pointer;
  font-size:13px; font-family:var(--font);
  border:2px solid transparent; transition:all .2s;
  background:var(--bg2); color:var(--muted);
}
.chBtn.today{border-color:var(--gold)!important}
.chBtn.active{background:var(--accent); color:#fff}
#chNote{color:var(--gold); font-size:11px; text-align:center; margin-top:8px}

/* ── PROGRESS ── */
#pgWrap{
  width:100%; max-width:520px;
  display:flex; align-items:center; gap:8px;
  padding:10px 16px 0;
}
#pgBar{flex:1; height:7px; background:var(--bg3); border-radius:4px; overflow:hidden}
#pgFill{
  height:100%; width:0;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:4px; transition:width .4s;
}
#pgLabel{font-size:12px; color:var(--muted); min-width:36px; text-align:right}

/* ── MODE TABS ── */
#modeTabs{
  width:100%; max-width:520px;
  display:flex; gap:6px; padding:10px 16px 0;
  overflow-x:auto; scrollbar-width:none;
}
#modeTabs::-webkit-scrollbar{display:none}
.mTab{
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; color:var(--muted);
  padding:6px 14px; font-size:13px; cursor:pointer;
  white-space:nowrap; font-family:var(--font); transition:all .2s;
  flex-shrink:0;
}
.mTab.on{background:var(--accent); border-color:#5b8df0; color:#fff}

/* ── MAIN ── */
#main{width:100%; max-width:520px; padding:14px 16px 0; display:flex; flex-direction:column; gap:12px}
#verseLabel{color:var(--gold); font-size:13px; letter-spacing:1px}

/* ── CARD ── */
#card{
  background:linear-gradient(135deg,#0d1b3e,#112040);
  border:1px solid var(--border); border-radius:20px;
  padding:22px 18px; box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:flex; flex-direction:column; gap:14px;
}
.vText{
  font-size:18px; line-height:2.1; color:var(--text);
  text-align:center; letter-spacing:.3px;
}
.hint{font-size:13px; color:var(--muted); text-align:center}
.recallFirst{
  background:#0a1628; border-radius:10px;
  padding:10px 16px; color:#5b8df0;
  font-size:16px; text-align:center; line-height:2;
}

/* 빈칸 인라인 */
.blank-line{
  font-size:18px; line-height:2.3; text-align:center;
  letter-spacing:.3px; color:var(--text);
}
.blank-box{
  display:inline-block;
  border-bottom:2px solid var(--accent2);
  min-width:80px; text-align:center;
  color:var(--accent2); font-weight:600;
  vertical-align:bottom; padding:0 4px;
}
.blank-input-wrap{display:flex; gap:8px; align-items:stretch}
input.word-input{
  background:#0a1628; border:2px solid var(--border);
  border-radius:12px; color:var(--text);
  padding:12px 16px; font-size:17px; flex:1; outline:none;
  font-family:var(--font); transition:border-color .2s;
  text-align:center;
}
input.word-input:focus{border-color:var(--accent)}

/* choices (객관식) */
#choices{display:flex; flex-direction:column; gap:8px}
.choiceBtn{
  background:var(--bg3); border:2px solid var(--border);
  border-radius:12px; color:var(--text);
  padding:13px 16px; font-size:16px; cursor:pointer;
  font-family:var(--font); text-align:left; transition:all .2s;
  line-height:1.6;
}
.choiceBtn:active{transform:scale(.98)}
.choiceBtn.correct{background:rgba(34,197,94,.2); border-color:rgba(34,197,94,.6); color:var(--green)}
.choiceBtn.wrong{background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.5); color:var(--red)}
.choiceBtn.reveal{background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.4)}

/* textarea */
textarea{
  background:#0a1628; border:2px solid var(--border);
  border-radius:12px; color:var(--text);
  padding:12px 16px; font-size:16px; width:100%;
  outline:none; resize:none; font-family:var(--font);
  line-height:2; transition:border-color .2s;
}
textarea:focus{border-color:var(--accent)}

/* feedback */
.okBox{
  background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4);
  border-radius:12px; padding:12px 16px;
  color:var(--green); font-size:15px;
}
.ngBox{
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.35);
  border-radius:12px; padding:12px 16px;
  color:var(--red); font-size:14px;
  display:flex; flex-direction:column; gap:8px;
}
.answerText{
  background:#060d1f; border-radius:8px; padding:10px 14px;
  color:#93c5fd; font-size:14px; line-height:2;
}

/* buttons */
.btn{
  background:linear-gradient(135deg,#2d5be3,#1e40af);
  border:none; border-radius:14px; color:#fff;
  padding:14px; font-size:16px; cursor:pointer; width:100%;
  font-family:var(--font); font-weight:700; letter-spacing:.5px;
  box-shadow:0 4px 12px rgba(45,91,227,.4); transition:opacity .15s;
}
.btn:active{opacity:.82}
.btn.ghost{background:var(--bg3); box-shadow:none; font-size:14px; color:var(--muted)}

/* streak */
#streakToast{
  display:none; text-align:center;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  border-radius:20px; padding:8px 20px;
  color:#fff; font-size:13px; font-weight:700;
  box-shadow:0 4px 12px rgba(124,58,237,.4);
}

/* done */
#doneScreen{
  display:none; width:100%; max-width:400px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:24px; padding:32px 24px;
  flex-direction:column; align-items:center; gap:16px;
  margin:40px 16px; box-shadow:0 12px 40px rgba(0,0,0,.6);
}
#doneScreen h2{font-size:24px; color:var(--text)}
.statRow{display:flex; gap:28px; margin-top:4px}
.stat{display:flex; flex-direction:column; align-items:center; gap:3px}
.statN{font-size:30px; font-weight:700; color:var(--gold)}
.statL{font-size:12px; color:var(--muted)}

#footer{font-size:11px; color:#3d5a8a; text-align:center; padding:12px 16px 0; width:100%; max-width:520px}

@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .28s ease}
</style>
</head>
<body>

<div id="header">
  <button class="chip" onclick="toggleCh()">📅 잠언 <span id="chLabel">1</span>장</button>
  <div id="heartsRow"></div>
  <div class="chip" id="xpBadge">✨ <span id="xpLabel">0</span> XP</div>
</div>

<div id="chPanel">
  <div id="chGrid"></div>
  <p id="chNote"></p>
</div>

<div id="pgWrap">
  <div id="pgBar"><div id="pgFill"></div></div>
  <span id="pgLabel">0/0</span>
</div>

<div id="modeTabs">
  <button class="mTab" data-m="read">📖 읽기</button>
  <button class="mTab" data-m="blank">✏️ 빈칸채우기</button>
  <button class="mTab" data-m="typing">⌨️ 받아쓰기</button>
  <button class="mTab" data-m="recall">🧠 암송</button>
</div>

<div id="main">
  <div id="verseLabel"></div>
  <div id="card"></div>
  <div id="streakToast"></div>
  <div id="footer"></div>
</div>

<div id="doneScreen">
  <div style="font-size:60px">🎉</div>
  <h2>훈련 완료!</h2>
  <p id="doneSubtitle" style="color:var(--muted);font-size:14px"></p>
  <div class="statRow">
    <div class="stat"><div class="statN" id="dXP">0</div><div class="statL">✨ XP</div></div>
    <div class="stat"><div class="statN" id="dStreak">0</div><div class="statL">🔥 최고연속</div></div>
    <div class="stat"><div class="statN" id="dHearts">0</div><div class="statL">❤️ 남음</div></div>
  </div>
  <button class="btn" onclick="restart()">다시 훈련하기</button>
  <button class="btn" onclick="nextMode()" style="background:var(--bg3);margin-top:4px">다음 단계 →</button>
</div>

<script>
// ══════════════════════════════════════════════
// 개역개정 잠언 데이터
// 각 절마다 keys: 빈칸이 될 핵심단어(들) 지정
// keys 배열 중 하나를 랜덤으로 빈칸으로 만듦
// ══════════════════════════════════════════════
const DATA = {
 1:[
  {v:7, t:"여호와를 경외하는 것이 지식의 근본이거늘 미련한 자는 지혜와 훈계를 멸시하느니라", keys:["경외","지식","근본","멸시"]},
  {v:8, t:"내 아들아 네 아버지의 훈계를 들으며 네 어머니의 법을 떠나지 말라", keys:["훈계","법"]},
  {v:9, t:"이는 네 머리의 아름다운 관이요 네 목의 금 사슬이니라", keys:["관","금","사슬"]},
  {v:10, t:"내 아들아 악한 자가 너를 꾈지라도 따르지 말라", keys:["악한","꾈지라도","따르지"]},
  {v:19, t:"이익을 탐하는 모든 자의 길은 다 이러하여 자기의 생명을 잃게 하느니라", keys:["이익","탐하는","생명"]},
  {v:33, t:"오직 내 말을 듣는 자는 평안히 살며 재앙의 두려움이 없이 안전하리라", keys:["평안히","재앙","안전"]},
 ],
 2:[
  {v:4, t:"은을 구하는 것 같이 그것을 구하며 감추어진 보배를 찾는 것 같이 그것을 찾으면", keys:["은","보배"]},
  {v:5, t:"여호와 경외하기를 깨달으며 하나님을 알게 되리니", keys:["경외","하나님"]},
  {v:6, t:"대저 여호와는 지혜를 주시며 지식과 명철은 그의 입에서 나오며", keys:["지혜","지식","명철"]},
  {v:7, t:"그는 정직한 자를 위하여 완전한 지혜를 예비하시며 행실이 온전한 자에게 방패가 되시나니", keys:["정직한","지혜","방패"]},
  {v:9, t:"그런즉 네가 공의와 정의와 정직 곧 모든 선한 길을 깨달을 것이라", keys:["공의","정의","정직"]},
  {v:20, t:"지혜가 너를 선한 자의 길로 행하게 하며 또 의인의 길을 지키게 하리니", keys:["지혜","선한","의인"]},
 ],
 3:[
  {v:1, t:"내 아들아 나의 법을 잊어버리지 말고 네 마음으로 나의 명령을 지키라", keys:["법","명령"]},
  {v:3, t:"인자와 진리가 네게서 떠나지 말게 하고 그것을 네 목에 매며 네 마음판에 새기라", keys:["인자","진리","마음판"]},
  {v:5, t:"너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라", keys:["신뢰","명철","의지"]},
  {v:6, t:"너는 범사에 그를 인정하라 그리하면 네 길을 지도하시리라", keys:["범사","인정","지도"]},
  {v:7, t:"스스로 지혜롭게 여기지 말지어다 여호와를 경외하며 악을 떠날지어다", keys:["지혜롭게","경외","악"]},
  {v:9, t:"네 재물과 네 소산물의 처음 익은 열매로 여호와를 공경하라", keys:["재물","소산물","열매","공경"]},
  {v:10, t:"그리하면 네 창고가 가득히 차고 네 포도즙 틀에 새 포도즙이 넘치리라", keys:["창고","포도즙"]},
  {v:12, t:"대저 여호와께서 그 사랑하시는 자를 징계하시기를 마치 아비가 그 기뻐하는 아들을 징계함 같이 하시느니라", keys:["사랑하시는","징계"]},
  {v:15, t:"지혜는 진주보다 귀하니 네가 사모하는 모든 것으로도 이에 비교할 수 없도다", keys:["진주","귀하니","사모"]},
  {v:17, t:"그 길은 즐거운 길이요 그의 지름길은 다 평강이니라", keys:["즐거운","평강"]},
  {v:18, t:"지혜는 그 얻은 자에게 생명 나무라 지혜를 가진 자는 복되도다", keys:["생명","나무","복"]},
  {v:27, t:"네 손이 선을 베풀 힘이 있거든 마땅히 받을 자에게 베풀기를 아끼지 말며", keys:["선","베풀","아끼지"]},
  {v:34, t:"진실로 그는 거만한 자를 비웃으시며 겸손한 자에게 은혜를 베푸시나니", keys:["거만한","겸손한","은혜"]},
  {v:35, t:"지혜로운 자는 영광을 기업으로 받거니와 미련한 자의 영달함은 수치가 되느니라", keys:["영광","기업","수치"]},
 ],
 4:[
  {v:5, t:"지혜를 얻으며 명철을 얻으라 내 입의 말을 잊지 말며 어기지 말라", keys:["지혜","명철"]},
  {v:7, t:"지혜가 제일이니 지혜를 얻으라 네가 얻은 모든 것을 가지고 명철을 얻을지니라", keys:["지혜","제일","명철"]},
  {v:13, t:"훈계를 굳게 잡아 놓치지 말고 지키라 이것이 네 생명이니라", keys:["훈계","생명"]},
  {v:18, t:"의인의 길은 돋는 햇살 같아서 크게 빛나 한낮의 광명에 이르거니와", keys:["의인","햇살","광명"]},
  {v:19, t:"악인의 길은 어둠 같아서 그가 걸려 넘어져도 그것이 무엇인지 깨닫지 못하느니라", keys:["악인","어둠","깨닫지"]},
  {v:23, t:"모든 지킬 만한 것 중에 더욱 네 마음을 지키라 생명의 근원이 이에서 남이니라", keys:["마음","생명","근원"]},
  {v:27, t:"좌로나 우로나 치우치지 말고 네 발을 악에서 떠나게 하라", keys:["치우치지","악"]},
 ],
 5:[
  {v:21, t:"대저 사람의 길은 여호와의 눈 앞에 있나니 그가 그 사람의 모든 길을 평탄하게 하시느니라", keys:["여호와","눈","평탄"]},
  {v:22, t:"악인은 자기의 악에 걸리며 그 죄의 줄에 매이나니", keys:["악","죄","줄"]},
  {v:23, t:"그는 훈계를 받지 아니함으로 말미암아 죽겠고 심히 미련함으로 말미암아 혼미하게 되느니라", keys:["훈계","미련","혼미"]},
 ],
 6:[
  {v:6, t:"게으른 자여 개미에게 가서 그가 하는 것을 보고 지혜를 얻으라", keys:["게으른","개미","지혜"]},
  {v:9, t:"게으른 자여 네가 어느 때까지 누워 있겠느냐 네가 어느 때에 잠이 깨어 일어나겠느냐", keys:["게으른","누워","잠"]},
  {v:11, t:"네 빈궁이 강도 같이 오며 네 곤핍이 군사 같이 이르리라", keys:["빈궁","강도","곤핍","군사"]},
  {v:16, t:"여호와께서 미워하시는 것 곧 그의 마음에 싫어하시는 것이 예닐곱 가지이니", keys:["미워하시는","예닐곱"]},
  {v:17, t:"곧 교만한 눈과 거짓된 혀와 무죄한 자의 피를 흘리는 손과", keys:["교만한","거짓된","무죄한","피"]},
  {v:18, t:"악한 계교를 꾀하는 마음과 빨리 악으로 달려가는 발과", keys:["계교","악","발"]},
  {v:19, t:"거짓을 말하는 망령된 증인과 및 형제 사이를 이간하는 자이니라", keys:["거짓","망령된","이간"]},
  {v:23, t:"대저 명령은 등불이요 법은 빛이요 훈계의 책망은 곧 생명의 길이라", keys:["명령","등불","법","빛","생명"]},
 ],

  {v:31, t:"그 손의 열매가 그에게로 돌아갈 것이요 그 행한 일로 말미암아 성문에서 칭찬을 받으리라", keys:["열매","성문","칭찬"]},

// ── 상태 ──
const today = new Date();
const todayCh = today.getDate(); // 1~31
let ch = todayCh, mode = 'read', vi = 0;
let hearts = 5, xp = 0, streak = 0, bestStreak = 0;
let feedback = null, showAns = false;
let blankKey = '', blankChoices = [];

const MODES = [
  {id:'read',    label:'📖 읽기'},
  {id:'blank',   label:'✏️ 빈칸채우기'},
  {id:'typing',  label:'⌨️ 받아쓰기'},
  {id:'recall',  label:'🧠 암송'},
];

function verses(){ return DATA[ch] || []; }
function verse(){ return verses()[vi]; }

// ── 빈칸 핵심단어 선택 ──
function pickBlank(v){
  const keys = v.keys || [];
  if(!keys.length) return keys[0];
  return keys[Math.floor(Math.random()*keys.length)];
}

// ── 객관식 보기 생성 (빈칸 모드) ──
function makeChoices(correct){
  // 같은 장 전체 keys 풀에서 오답 추출
  const pool = new Set();
  verses().forEach(v2=>{
    (v2.keys||[]).forEach(k=>{ if(k!==correct) pool.add(k); });
  });
  // 다른 장에서도 보충
  Object.values(DATA).forEach(arr=>{
    arr.forEach(v2=>{
      (v2.keys||[]).forEach(k=>{ if(k!==correct) pool.add(k); });
    });
  });
  const others = shuffle([...pool]).slice(0,3);
  return shuffle([correct,...others]);
}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

// ── 초기화 ──
function initSession(){
  vi=0; hearts=5; xp=0; streak=0; bestStreak=0;
  feedback=null; showAns=false;
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('main').style.display='flex';
  renderAll();
}
function resetVerse(){
  feedback=null; showAns=false; blankKey=''; blankChoices=[];
  if(mode==='blank' && verse()){
    blankKey=pickBlank(verse());
    blankChoices=makeChoices(blankKey);
  }
}

// ── 렌더 전체 ──
function renderAll(){
  const vs=verses(), v=verse();
  // header
  document.getElementById('chLabel').textContent=ch;
  renderHearts();
  document.getElementById('xpLabel').textContent=xp;
  // progress
  const pct=vs.length?((vi)/vs.length*100):0;
  document.getElementById('pgFill').style.width=pct+'%';
  document.getElementById('pgLabel').textContent=vi+'/'+vs.length;
  // mode tabs
  document.querySelectorAll('.mTab').forEach(b=>{
    b.classList.toggle('on', b.dataset.m===mode);
  });
  // verse label
  document.getElementById('verseLabel').textContent=`잠언 ${ch}:${v?v.v:'-'} (개역개정)`;
  // streak toast
  const st=document.getElementById('streakToast');
  if(streak>=3){ st.style.display='block'; st.textContent=`🔥 ${streak}연속 정답! +${Math.min(streak*2,20)} 보너스 XP`; }
  else st.style.display='none';
  // footer
  document.getElementById('footer').textContent=
    `오늘은 ${today.getMonth()+1}월 ${today.getDate()}일 · 오늘의 말씀: 잠언 ${todayCh}장 (개역개정)`;
  // card
  renderCard();
}

function renderHearts(){
  document.getElementById('heartsRow').innerHTML=
    Array.from({length:5}).map((_,i)=>
      `<span style="opacity:${i<hearts?1:.2}">❤️</span>`).join('');
}

// ── 카드 렌더 ──
function renderCard(){
  const card=document.getElementById('card');
  const v=verse();
  if(!v){ renderDone(); return; }
  card.innerHTML='';

  if(mode==='read') renderRead(card,v);
  else if(mode==='blank') renderBlank(card,v);
  else if(mode==='typing') renderTyping(card,v);
  else if(mode==='recall') renderRecall(card,v);
}

// 읽기
function renderRead(card,v){
  card.innerHTML=`
    <p class="vText">${v.t}</p>
    ${streak>=3?`<div style="text-align:center"><span style="background:#7c3aed;border-radius:20px;padding:4px 14px;font-size:13px;color:#fff">🔥 ${streak}연속!</span></div>`:''}
    <button class="btn" onclick="nextVerse()">다음 절 →</button>`;
}

// 빈칸채우기 (객관식)
function renderBlank(card,v){
  if(!blankKey) resetVerse();
  const key=blankKey;
  // 빈칸 표시 텍스트
  const display=v.t.replace(new RegExp(key,'g'), `<span class="blank-box">${feedback?key:'　　　'}</span>`);

  let html=`<p class="blank-line">${display}</p>`;

  if(feedback===null){
    html+=`<p class="hint">아래 보기에서 빈칸에 들어갈 핵심 단어를 고르세요</p>`;
    html+=`<div id="choices">`;
    blankChoices.forEach((c,i)=>{
      html+=`<button class="choiceBtn" onclick="checkChoice('${c}')">${c}</button>`;
    });
    html+=`</div>`;
  } else if(feedback==='correct'){
    html+=`<div class="okBox">✅ 정답! <strong>${key}</strong></div>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  } else {
    html+=`<div class="ngBox">❌ 정답은 <strong>${key}</strong> 입니다</div>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  }
  card.innerHTML=html;
}

// 받아쓰기
function renderTyping(card,v){
  let html=`
    <p class="hint">아래 절을 보고 그대로 입력하세요</p>
    <p class="vText" style="color:#607090;font-size:15px">${v.t}</p>
    <textarea id="tInput" rows="3" placeholder="여기에 입력...">${getInput()}</textarea>`;

  if(feedback===null){
    html+=`<button class="btn" onclick="checkText()">확인</button>`;
  } else if(feedback==='correct'){
    html+=`<div class="okBox">✅ 정확합니다!</div>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  } else {
    html+=`<div class="ngBox">❌ 다시 확인하세요`;
    if(showAns) html+=`<div class="answerText">${v.t}</div>`;
    html+=`</div>`;
    if(!showAns) html+=`<button class="btn ghost" onclick="revealAns()">정답 보기</button>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  }
  card.innerHTML=html;
  const ta=document.getElementById('tInput');
  if(ta){ ta.focus(); ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.ctrlKey) checkText(); }); }
}

// 암송
function renderRecall(card,v){
  const hint=v.t.split(' ').slice(0,2).join(' ')+' ...';
  let html=`
    <p class="hint">잠언 ${ch}:${v.v} — 전체 절을 암송해 입력하세요</p>
    <div class="recallFirst">${hint}</div>
    <textarea id="tInput" rows="4" placeholder="암송하여 입력...">${getInput()}</textarea>`;

  if(feedback===null){
    html+=`<button class="btn" onclick="checkText()">확인</button>`;
  } else if(feedback==='correct'){
    html+=`<div class="okBox">✅ 완벽히 암송했습니다! 🔥</div>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  } else {
    html+=`<div class="ngBox">❌ 정확하지 않습니다`;
    if(showAns) html+=`<div class="answerText">${v.t}</div>`;
    html+=`</div>`;
    if(!showAns) html+=`<button class="btn ghost" onclick="revealAns()">정답 보기</button>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;
  }
  card.innerHTML=html;
  const ta=document.getElementById('tInput');
  if(ta){ ta.focus(); ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.ctrlKey) checkText(); }); }
}

let _inputVal='';
function getInput(){ return _inputVal; }

// ── 정답 확인 ──
function checkChoice(selected){
  const correct=blankKey;
  document.querySelectorAll('.choiceBtn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('reveal');
    if(b.textContent===selected && selected!==correct) b.classList.add('wrong');
  });
  if(selected===correct){
    feedback='correct';
    streak++; bestStreak=Math.max(bestStreak,streak);
    xp+=10+Math.min(streak*2,20);
  } else {
    feedback='wrong';
    streak=0; hearts=Math.max(0,hearts-1);
  }
  renderAll();
}

function checkText(){
  const ta=document.getElementById('tInput');
  if(!ta) return;
  _inputVal=ta.value;
  const input=ta.value.replace(/\s+/g,' ').trim();
  const answer=verse().t.replace(/\s+/g,' ').trim();
  if(input===answer){
    feedback='correct';
    streak++; bestStreak=Math.max(bestStreak,streak);
    xp+=10+Math.min(streak*2,20);
  } else {
    feedback='wrong';
    streak=0; hearts=Math.max(0,hearts-1);
  }
  renderAll();
}

function revealAns(){ showAns=true; renderAll(); }

// ── 다음 절 ──
function nextVerse(){
  _inputVal='';
  vi++;
  if(vi>=verses().length){ renderDone(); return; }
  resetVerse();
  renderAll();
}

// ── 완료 화면 ──
function renderDone(){
  document.getElementById('main').style.display='none';
  const ds=document.getElementById('doneScreen');
  ds.style.display='flex';
  document.getElementById('doneSubtitle').textContent=`잠언 ${ch}장 · ${MODES.find(m2=>m2.id===mode)?.label}`;
  document.getElementById('dXP').textContent=xp;
  document.getElementById('dStreak').textContent=bestStreak;
  document.getElementById('dHearts').textContent=hearts;
}

function restart(){ initSession(); }
function nextMode(){
  const idx=MODES.findIndex(m2=>m2.id===mode);
  mode=MODES[(idx+1)%MODES.length].id;
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('main').style.display='flex';
  initSession();
}

// ── 장 선택 패널 ──
function buildChGrid(){
  const grid=document.getElementById('chGrid');
  grid.innerHTML='';
  for(let i=1;i<=31;i++){
    const b=document.createElement('button');
    b.className='chBtn'+(i===ch?' active':'')+(i===todayCh?' today':'');
    b.textContent=i;
    b.onclick=()=>{ ch=i; toggleCh(); initSession(); };
    grid.appendChild(b);
  }
  document.getElementById('chNote').textContent=`🌟 노란 테두리 = 오늘(${todayCh}장)`;
}
function toggleCh(){
  const p=document.getElementById('chPanel');
  const open=p.style.display==='block';
  p.style.display=open?'none':'block';
  if(!open) buildChGrid();
}

// ── 모드 탭 ──
document.querySelectorAll('.mTab').forEach(b=>{
  b.addEventListener('click',()=>{
    mode=b.dataset.m;
    initSession();
  });
});

// ── 시작 ──
resetVerse();
initSession();
</script>
</body>
</html>
