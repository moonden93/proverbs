<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="잠언암기">
<meta name="theme-color" content="#050c1a">
<title>잠언 암기 (개역개정) 17-31장</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#050c1a;--bg2:#0d1b3e;--bg3:#1a2744;--accent:#2d5be3;--accent2:#60a5fa;--gold:#f0c040;--green:#86efac;--red:#fca5a5;--text:#e8edf8;--muted:#8ca0c8;--border:#1e3a6e;--font:'Nanum Gothic',sans-serif;}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;align-items:center;padding-bottom:40px;overflow-x:hidden}
#header{position:sticky;top:0;z-index:100;width:100%;max-width:520px;background:rgba(5,12,26,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:#93b4ff;padding:6px 14px;font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap}
#xpBadge{color:var(--gold)}
#heartsRow{font-size:18px;display:flex;gap:1px}
#chPanel{display:none;width:100%;max-width:520px;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 12px}
#chGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.chBtn{border-radius:8px;padding:7px 2px;cursor:pointer;font-size:12px;font-family:var(--font);border:2px solid transparent;transition:all .2s;background:var(--bg2);color:var(--muted)}
.chBtn.today{border-color:var(--gold)!important}
.chBtn.active{background:var(--accent);color:#fff}
#chNote{color:var(--gold);font-size:11px;text-align:center;margin-top:8px}
#pgWrap{width:100%;max-width:520px;display:flex;align-items:center;gap:8px;padding:10px 16px 0}
#pgBar{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
#pgFill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s}
#pgLabel{font-size:12px;color:var(--muted);min-width:36px;text-align:right}
#modeTabs{width:100%;max-width:520px;display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
#modeTabs::-webkit-scrollbar{display:none}
.mTab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--muted);padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .2s;flex-shrink:0}
.mTab.on{background:var(--accent);border-color:#5b8df0;color:#fff}
#main{width:100%;max-width:520px;padding:14px 16px 0;display:flex;flex-direction:column;gap:12px}
#verseLabel{color:var(--gold);font-size:13px;letter-spacing:1px}
#card{background:linear-gradient(135deg,#0d1b3e,#112040);border:1px solid var(--border);border-radius:20px;padding:22px 18px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:14px}
.vText{font-size:17px;line-height:2.1;color:var(--text);text-align:center;letter-spacing:.3px}
.hint{font-size:13px;color:var(--muted);text-align:center}
.recallFirst{background:#0a1628;border-radius:10px;padding:10px 16px;color:#5b8df0;font-size:16px;text-align:center;line-height:2}
.blank-line{font-size:17px;line-height:2.3;text-align:center;letter-spacing:.3px;color:var(--text)}
.blank-box{display:inline-block;border-bottom:2px solid var(--accent2);min-width:80px;text-align:center;color:var(--accent2);font-weight:700;vertical-align:bottom;padding:0 4px}
#choices{display:flex;flex-direction:column;gap:8px}
.choiceBtn{background:var(--bg3);border:2px solid var(--border);border-radius:12px;color:var(--text);padding:13px 16px;font-size:16px;cursor:pointer;font-family:var(--font);text-align:left;transition:all .2s;line-height:1.6}
.choiceBtn:active{transform:scale(.98)}
.choiceBtn.correct{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.6);color:var(--green)}
.choiceBtn.wrong{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:var(--red)}
.choiceBtn.reveal{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4)}
textarea{background:#0a1628;border:2px solid var(--border);border-radius:12px;color:var(--text);padding:12px 16px;font-size:16px;width:100%;outline:none;resize:none;font-family:var(--font);line-height:2;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.okBox{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);border-radius:12px;padding:12px 16px;color:var(--green);font-size:15px}
.ngBox{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:12px;padding:12px 16px;color:var(--red);font-size:14px;display:flex;flex-direction:column;gap:8px}
.answerText{background:#060d1f;border-radius:8px;padding:10px 14px;color:#93c5fd;font-size:14px;line-height:2}
.btn{background:linear-gradient(135deg,#2d5be3,#1e40af);border:none;border-radius:14px;color:#fff;padding:14px;font-size:16px;cursor:pointer;width:100%;font-family:var(--font);font-weight:700;letter-spacing:.5px;box-shadow:0 4px 12px rgba(45,91,227,.4);transition:opacity .15s}
.btn:active{opacity:.82}
.btn.ghost{background:var(--bg3);box-shadow:none;font-size:14px;color:var(--muted)}
#streakToast{display:none;text-align:center;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:20px;padding:8px 20px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 4px 12px rgba(124,58,237,.4)}
#doneScreen{display:none;width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px 24px;flex-direction:column;align-items:center;gap:16px;margin:40px 16px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
#doneScreen h2{font-size:24px;color:var(--text)}
.statRow{display:flex;gap:28px;margin-top:4px}
.stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.statN{font-size:30px;font-weight:700;color:var(--gold)}
.statL{font-size:12px;color:var(--muted)}
#footer{font-size:11px;color:#3d5a8a;text-align:center;padding:12px 16px 0;width:100%;max-width:520px}
</style>
</head>
<body>
<div id="header">
  <button class="chip" onclick="toggleCh()">📅 잠언 <span id="chLabel">17</span>장</button>
  <div id="heartsRow"></div>
  <div class="chip" id="xpBadge">✨ <span id="xpLabel">0</span> XP</div>
</div>
<div id="chPanel">
  <div id="chGrid"></div>
  <p id="chNote"></p>
</div>
<div id="pgWrap">
  <div id="pgBar"><div id="pgFill"></div></div>
  <span id="pgLabel">0/0</span>
</div>
<div id="modeTabs">
  <button class="mTab" data-m="read">📖 읽기</button>
  <button class="mTab" data-m="blank">✏️ 빈칸채우기</button>
  <button class="mTab" data-m="typing">⌨️ 받아쓰기</button>
  <button class="mTab" data-m="recall">🧠 암송</button>
</div>
<div id="main">
  <div id="verseLabel"></div>
  <div id="card"></div>
  <div id="streakToast"></div>
  <div id="footer"></div>
</div>
<div id="doneScreen">
  <div style="font-size:60px">🎉</div>
  <h2>훈련 완료!</h2>
  <p id="doneSubtitle" style="color:var(--muted);font-size:14px"></p>
  <div class="statRow">
    <div class="stat"><div class="statN" id="dXP">0</div><div class="statL">✨ XP</div></div>
    <div class="stat"><div class="statN" id="dStreak">0</div><div class="statL">🔥 최고연속</div></div>
    <div class="stat"><div class="statN" id="dHearts">0</div><div class="statL">❤️ 남음</div></div>
  </div>
  <button class="btn" onclick="restart()">다시 훈련하기</button>
  <button class="btn" onclick="nextMode()" style="background:var(--bg3);margin-top:4px">다음 단계 →</button>
</div>
<script>
const DATA = {
17:[
{v:1,t:"마른 떡 한 조각만 있고도 화목하는 것이 제육이 집에 가득하고도 다투는 것보다 나으니라",k:["떡","화목","제육","다투는"]},
{v:2,t:"슬기로운 종은 부끄러운 짓을 하는 주인의 아들을 다스리겠고 또 형제들 중에서 유업을 나누어 얻으리라",k:["슬기로운","종","유업"]},
{v:3,t:"도가니는 은을, 풀무는 금을 연단하거니와 여호와는 마음을 연단하시느니라",k:["도가니","은","풀무","금","마음"]},
{v:4,t:"악을 행하는 자는 사악한 입술이 하는 말을 잘 듣고 거짓말을 하는 자는 악한 혀가 하는 말에 귀를 기울이느니라",k:["악","사악한","거짓말","혀"]},
{v:5,t:"가난한 자를 조롱하는 자는 그를 지으신 주를 멸시하는 자요 사람의 재앙을 기뻐하는 자는 형벌을 면하지 못할 자니라",k:["가난한","멸시","재앙","형벌"]},
{v:6,t:"손자는 노인의 면류관이요 아비는 자식의 영화니라",k:["손자","면류관","아비","영화"]},
{v:7,t:"지나친 말을 하는 것도 미련한 자에게 합당하지 아니하거든 하물며 거짓말을 하는 것이 존귀한 자에게 합당하겠느냐",k:["미련한","거짓말","존귀한"]},
{v:8,t:"뇌물은 그 임자가 보기에 보석 같은즉 그가 어디로 향하든지 형통하게 하느니라",k:["뇌물","보석","형통"]},
{v:9,t:"허물을 덮어 주는 자는 사랑을 구하는 자요 그것을 거듭 말하는 자는 친한 벗을 이간하는 자니라",k:["허물","사랑","이간"]},
{v:10,t:"한 마디 말로 총명한 자에게 충고하는 것이 매 백 대로 미련한 자를 때리는 것보다 더욱 깊이 박히느니라",k:["총명한","충고","미련한"]},
{v:11,t:"악한 자는 반역만 힘쓰나니 그러므로 그에게 잔인한 사자가 보냄을 받으리라",k:["악한","반역","잔인한"]},
{v:12,t:"차라리 새끼 빼앗긴 암곰을 만날지언정 미련한 일을 행하는 미련한 자를 만나지 말 것이니라",k:["암곰","미련한"]},
{v:13,t:"누구든지 악으로 선을 갚으면 악이 그 집을 떠나지 아니하리라",k:["악","선","집"]},
{v:14,t:"다투는 시작은 둑에서 물이 새는 것 같은즉 싸움이 일어나기 전에 시비를 그칠 것이니라",k:["다투는","둑","시비"]},
{v:15,t:"악인을 의롭다 하고 의인을 악하다 하는 이 두 사람은 다 여호와께 미움을 받느니라",k:["악인","의인","미움"]},
{v:16,t:"미련한 자는 무지하거늘 손에 값을 가지고 지혜를 사려 함은 어찜인고",k:["미련한","무지","지혜"]},
{v:17,t:"친구는 사랑이 끊어지지 아니하고 형제는 위급한 때를 위하여 났느니라",k:["친구","사랑","형제","위급"]},
{v:18,t:"지혜 없는 자는 남의 손을 잡고 그의 이웃 앞에서 보증이 되느니라",k:["지혜","보증","이웃"]},
{v:19,t:"다툼을 좋아하는 자는 죄과를 좋아하는 자요 자기 문을 높이는 자는 파괴를 구하는 자니라",k:["다툼","죄과","파괴"]},
{v:20,t:"마음이 굽은 자는 복을 얻지 못하고 혀가 패역한 자는 재앙에 빠지느니라",k:["굽은","복","패역한","재앙"]},
{v:21,t:"미련한 자를 낳는 자는 근심을 당하나니 미련한 자의 아비는 낙이 없느니라",k:["미련한","근심","아비","낙"]},
{v:22,t:"마음의 즐거움은 양약이라도 심령의 근심은 뼈를 마르게 하느니라",k:["즐거움","양약","근심","뼈"]},
{v:23,t:"악인은 사람의 품에서 뇌물을 받고 재판을 굽게 하느니라",k:["악인","뇌물","재판"]},
{v:24,t:"지혜는 명철한 자 앞에 있거늘 미련한 자는 눈을 땅 끝에 두느니라",k:["지혜","명철한","미련한","눈"]},
{v:25,t:"미련한 아들은 그 아비의 근심이 되고 그 어미의 고통이 되느니라",k:["미련한","근심","고통"]},
{v:26,t:"의인을 벌하는 것과 귀인을 정직하다고 때리는 것은 선하지 못하니라",k:["의인","벌","귀인","정직하다"]},
{v:27,t:"말을 아끼는 자는 지식이 있고 성품이 냉철한 자는 명철하니라",k:["말","지식","냉철한","명철"]},
{v:28,t:"미련한 자라도 잠잠하면 지혜로운 자로 여겨지고 그의 입술을 닫으면 슬기로운 자로 여겨지느니라",k:["미련한","잠잠","지혜로운","입술"]},
],
18:[
{v:1,t:"무리에게서 스스로 갈라지는 자는 자기 소욕을 따르는 자라 온갖 참 지혜를 배척하느니라",k:["소욕","지혜","배척"]},
{v:2,t:"미련한 자는 명철을 기뻐하지 아니하고 자기의 의사를 드러내기만 기뻐하느니라",k:["미련한","명철","의사"]},
{v:3,t:"악한 자가 이를 때에는 멸시도 따라오고 부끄러운 것이 이를 때에는 능욕도 함께 오느니라",k:["악한","멸시","능욕"]},
{v:4,t:"명철한 사람의 입의 말은 깊은 물과 같고 지혜의 샘은 솟구쳐 흐르는 내와 같으니라",k:["명철한","지혜","샘"]},
{v:5,t:"악인을 두둔하는 것과 재판할 때에 의인을 억울하게 하는 것이 선하지 아니하니라",k:["악인","재판","의인"]},
{v:6,t:"미련한 자의 입술은 다툼을 일으키고 그의 입은 매를 자청하느니라",k:["미련한","입술","다툼","매"]},
{v:7,t:"미련한 자의 입은 그의 멸망이 되고 그의 입술은 그의 영혼의 그물이 되느니라",k:["미련한","입","멸망","영혼"]},
{v:8,t:"남의 말하기를 좋아하는 자의 말은 별식과 같아서 뱃속 깊은 데로 내려가느니라",k:["별식","뱃속"]},
{v:9,t:"자기의 일을 게을리하는 자는 패가하는 자의 형제니라",k:["게을리","패가"]},
{v:10,t:"여호와의 이름은 견고한 망대라 의인은 그리로 달려가서 안전함을 얻느니라",k:["이름","망대","의인","안전"]},
{v:11,t:"부자의 재물은 그의 견고한 성이라 그가 높은 성벽 같이 여기느니라",k:["부자","재물","성","성벽"]},
{v:12,t:"사람의 마음의 교만은 멸망의 선봉이요 겸손은 존귀의 길잡이니라",k:["교만","멸망","겸손","존귀"]},
{v:13,t:"사연을 듣기 전에 대답하는 자는 미련하여 욕을 당하느니라",k:["사연","대답","미련","욕"]},
{v:14,t:"사람의 심령은 그의 병을 능히 이기려니와 심령이 상하면 그것을 누가 일으키겠느냐",k:["심령","병","상하면"]},
{v:15,t:"명철한 자의 마음은 지식을 얻고 지혜로운 자의 귀는 지식을 구하느니라",k:["명철한","지식","지혜로운","귀"]},
{v:16,t:"사람의 선물은 그의 길을 넓게 하며 또 존귀한 자 앞으로 그를 인도하느니라",k:["선물","존귀한","인도"]},
{v:17,t:"송사에서는 먼저 온 사람의 말이 바른 것 같으나 그의 상대자가 와서 밝히느니라",k:["송사","상대자"]},
{v:18,t:"제비 뽑는 것은 다툼을 그치게 하여 강한 자 사이에 해결하게 하느니라",k:["제비","다툼","해결"]},
{v:19,t:"노엽게 한 형제와 화목하기가 견고한 성을 취하기보다 어려운즉 이러한 다툼은 산성 문빗장 같으니라",k:["형제","화목","성","다툼"]},
{v:20,t:"사람은 입에서 나오는 열매로 말미암아 배부르게 되나니 곧 그의 입술에서 나는 것으로 말미암아 만족하게 되느니라",k:["입","열매","입술","만족"]},
{v:21,t:"죽고 사는 것이 혀의 힘에 달렸나니 혀를 쓰기 좋아하는 자는 혀의 열매를 먹으리라",k:["죽고","혀","힘","열매"]},

const today=new Date(),todayCh=today.getDate();
let ch=todayCh>=17&&todayCh<=31?todayCh:17,mode='read',vi=0;
let hearts=5,xp=0,streak=0,bestStreak=0;
let feedback=null,showAns=false,blankKey='',blankChoices=[];
const MODES=[{id:'read',label:'📖 읽기'},{id:'blank',label:'✏️ 빈칸채우기'},{id:'typing',label:'⌨️ 받아쓰기'},{id:'recall',label:'🧠 암송'}];

function verses(){return DATA[ch]||[]}
function verse(){return verses()[vi]}
function pickBlank(v){const k=v.k||[];return k[Math.floor(Math.random()*k.length)]}
function makeChoices(correct){
  const pool=new Set();
  Object.values(DATA).forEach(arr=>arr.forEach(v=>(v.k||[]).forEach(k=>{if(k!==correct)pool.add(k)})));
  return shuffle([correct,...shuffle([...pool]).slice(0,3)]);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}

function initSession(){vi=0;hearts=5;xp=0;streak=0;bestStreak=0;feedback=null;showAns=false;
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('main').style.display='flex';
  renderAll();}
function resetVerse(){feedback=null;showAns=false;blankKey='';blankChoices=[];
  if(mode==='blank'&&verse()){blankKey=pickBlank(verse());blankChoices=makeChoices(blankKey);}}

function renderAll(){
  const vs=verses(),v=verse();
  document.getElementById('chLabel').textContent=ch;
  renderHearts();
  document.getElementById('xpLabel').textContent=xp;
  const pct=vs.length?(vi/vs.length*100):0;
  document.getElementById('pgFill').style.width=pct+'%';
  document.getElementById('pgLabel').textContent=vi+'/'+vs.length;
  document.querySelectorAll('.mTab').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
  document.getElementById('verseLabel').textContent=v?`잠언 ${ch}:${v.v} (개역개정)`:'';
  const st=document.getElementById('streakToast');
  if(streak>=3){st.style.display='block';st.textContent=`🔥 ${streak}연속! +${Math.min(streak*2,20)} 보너스 XP`;}
  else st.style.display='none';
  document.getElementById('footer').textContent=`오늘은 ${today.getMonth()+1}월 ${today.getDate()}일 · 오늘의 말씀: 잠언 ${todayCh}장 (개역개정) · 17-31장`;
  renderCard();
}
function renderHearts(){document.getElementById('heartsRow').innerHTML=Array.from({length:5}).map((_,i)=>`<span style="opacity:${i<hearts?1:.2}">❤️</span>`).join('')}

function renderCard(){
  const card=document.getElementById('card'),v=verse();
  if(!v){renderDone();return;}
  card.innerHTML='';
  if(mode==='read')renderRead(card,v);
  else if(mode==='blank')renderBlank(card,v);
  else if(mode==='typing')renderTyping(card,v);
  else if(mode==='recall')renderRecall(card,v);
}

function renderRead(card,v){
  card.innerHTML=`<p class="vText">${v.t}</p>
  ${streak>=3?`<div style="text-align:center"><span style="background:#7c3aed;border-radius:20px;padding:4px 14px;font-size:13px;color:#fff">🔥 ${streak}연속!</span></div>`:''}
  <button class="btn" onclick="nextVerse()">다음 절 →</button>`;}

function renderBlank(card,v){
  if(!blankKey)resetVerse();
  const key=blankKey;
  const display=v.t.replace(new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),`<span class="blank-box">${feedback?key:'　　　'}</span>`);
  let html=`<p class="blank-line">${display}</p>`;
  if(feedback===null){
    html+=`<p class="hint">빈칸에 들어갈 핵심 단어를 고르세요</p><div id="choices">`;
    blankChoices.forEach(c=>{html+=`<button class="choiceBtn" onclick="checkChoice('${c.replace(/'/g,"\\'")}')">　${c}　</button>`;});
    html+=`</div>`;
  }else if(feedback==='correct'){html+=`<div class="okBox">✅ 정답! <strong>${key}</strong></div><button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  else{html+=`<div class="ngBox">❌ 정답은 <strong>${key}</strong> 입니다</div><button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  card.innerHTML=html;
}

function renderTyping(card,v){
  let html=`<p class="hint">아래 절을 보고 그대로 입력하세요</p>
  <p class="vText" style="color:#607090;font-size:15px">${v.t}</p>
  <textarea id="tInput" rows="3" placeholder="여기에 입력...">${_inputVal}</textarea>`;
  if(feedback===null){html+=`<button class="btn" onclick="checkText()">확인</button>`;}
  else if(feedback==='correct'){html+=`<div class="okBox">✅ 정확합니다!</div><button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  else{html+=`<div class="ngBox">❌ 다시 확인하세요${showAns?`<div class="answerText">${v.t}</div>`:''}  </div>`;
    if(!showAns)html+=`<button class="btn ghost" onclick="revealAns()">정답 보기</button>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  card.innerHTML=html;
  const ta=document.getElementById('tInput');
  if(ta){ta.focus();ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)checkText();});}
}

function renderRecall(card,v){
  const hint=v.t.split(' ').slice(0,2).join(' ')+' ...';
  let html=`<p class="hint">잠언 ${ch}:${v.v} — 전체 절을 암송해 입력하세요</p>
  <div class="recallFirst">${hint}</div>
  <textarea id="tInput" rows="4" placeholder="암송하여 입력...">${_inputVal}</textarea>`;
  if(feedback===null){html+=`<button class="btn" onclick="checkText()">확인</button>`;}
  else if(feedback==='correct'){html+=`<div class="okBox">✅ 완벽히 암송했습니다! 🔥</div><button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  else{html+=`<div class="ngBox">❌ 정확하지 않습니다${showAns?`<div class="answerText">${v.t}</div>`:''}  </div>`;
    if(!showAns)html+=`<button class="btn ghost" onclick="revealAns()">정답 보기</button>`;
    html+=`<button class="btn" onclick="nextVerse()">다음 절 →</button>`;}
  card.innerHTML=html;
  const ta=document.getElementById('tInput');
  if(ta){ta.focus();ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)checkText();});}
}

let _inputVal='';
function checkChoice(selected){
  const correct=blankKey;
  document.querySelectorAll('.choiceBtn').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct)b.classList.add('reveal');
    if(b.textContent.trim()===selected&&selected!==correct)b.classList.add('wrong');
  });
  if(selected===correct){feedback='correct';streak++;bestStreak=Math.max(bestStreak,streak);xp+=10+Math.min(streak*2,20);}
  else{feedback='wrong';streak=0;hearts=Math.max(0,hearts-1);}
  renderAll();
}
function checkText(){
  const ta=document.getElementById('tInput');if(!ta)return;
  _inputVal=ta.value;
  const input=ta.value.replace(/\s+/g,' ').trim();
  const answer=verse().t.replace(/\s+/g,' ').trim();
  if(input===answer){feedback='correct';streak++;bestStreak=Math.max(bestStreak,streak);xp+=10+Math.min(streak*2,20);}
  else{feedback='wrong';streak=0;hearts=Math.max(0,hearts-1);}
  renderAll();
}
function revealAns(){showAns=true;renderAll();}
function nextVerse(){_inputVal='';vi++;if(vi>=verses().length){renderDone();return;}resetVerse();renderAll();}

function renderDone(){
  document.getElementById('main').style.display='none';
  const ds=document.getElementById('doneScreen');ds.style.display='flex';
  document.getElementById('doneSubtitle').textContent=`잠언 ${ch}장 · ${MODES.find(m=>m.id===mode)?.label}`;
  document.getElementById('dXP').textContent=xp;
  document.getElementById('dStreak').textContent=bestStreak;
  document.getElementById('dHearts').textContent=hearts;
}
function restart(){initSession();}
function nextMode(){const i=MODES.findIndex(m=>m.id===mode);mode=MODES[(i+1)%MODES.length].id;document.getElementById('doneScreen').style.display='none';document.getElementById('main').style.display='flex';initSession();}

function buildChGrid(){
  const grid=document.getElementById('chGrid');grid.innerHTML='';
  for(let i=17;i<=31;i++){
    const b=document.createElement('button');
    b.className='chBtn'+(i===ch?' active':'')+(i===todayCh&&todayCh>=17?' today':'');
    b.textContent=i;b.onclick=()=>{ch=i;toggleCh();initSession();};
    grid.appendChild(b);
  }
  document.getElementById('chNote').textContent=`🌟 노란 테두리 = 오늘(${todayCh}장) · 1-16장은 별도 파일`;
}
function toggleCh(){const p=document.getElementById('chPanel');const open=p.style.display==='block';p.style.display=open?'none':'block';if(!open)buildChGrid();}
document.querySelectorAll('.mTab').forEach(b=>b.addEventListener('click',()=>{mode=b.dataset.m;initSession();}));
resetVerse();initSession();
</script>
</body>
</html>
